name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  rag-service:
    name: RAG Service — lint + test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/rag-service

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: apps/rag-service/requirements.txt

      - name: Install deps
        run: pip install -r requirements.txt ruff mypy pytest pytest-cov

      - name: Lint
        run: ruff check .

      - name: Type check
        run: mypy app.py retriever.py llm_providers.py prompts.py --ignore-missing-imports

      - name: Test
        run: pytest --cov --cov-report=term-missing
